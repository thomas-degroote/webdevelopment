<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Formulier</title>
</head>
<body>
    <form action="" method="post">
        <fieldset>
            <legend>Persoonlijke informatie</legend>
            <label for="voornaam">Voornaam*:</label>
            <input type="text" id="voornaam" name="voornaam" placeholder="Your first name" required><br>

            <label for="familienaam">Familienaam*:</label>
            <input type="text" id="familienaam" name="familienaam" placeholder="Your last name" required><br>
        </fieldset>

        <fieldset>
            <legend>Sport</legend>
            <p>Welke sport beoefen je?</p>
            <input type="checkbox" id="lopen" name="sport" value="lopen">
            <label for="lopen">Lopen</label><br>

            <input type="checkbox" id="zwemmen" name="sport" value="zwemmen">
            <label for="zwemmen">Zwemmen</label><br>

            <input type="checkbox" id="roeien" name="sport" value="roeien">
            <label for="roeien">Roeien</label><br>
        </fieldset>

        <fieldset>
            <legend>Communicatievoorkeur</legend>
            <p>Hoe kunnen we je bereiken?</p>
            <input type="radio" id="post" name="communicatie" value="post" required>
            <label for="post">Per post</label><br>

            <input type="radio" id="email" name="communicatie" value="email" required>
            <label for="email">E-mail</label><br>
        </fieldset>

        <fieldset>
            <legend>Favorieten</legend>
            <label for="film">Favoriete film:</label>
            <input type="text" id="film" name="film"><br>

            <label for="quote">Favoriete quote:</label>
            <textarea id="quote" name="quote" placeholder="Schrijf je favoriete quote"></textarea><br>

            <label for="eten">Favoriete eten:</label>
            <select id="eten" name="eten">
                <option>Hamburger</option>
                <option>Hot-dog</option>
                <option>Pizza</option>
            </select><br>

            <label for="browser">Favoriete browser:</label>
            <input type="text" id="browser" name="browser"><br>
        </fieldset>

        <fieldset>
            <legend>Beveiliging &amp; contact</legend>
            <label for="wachtwoord">Wachtwoord*:</label>
            <input type="password" id="wachtwoord" name="wachtwoord" required><br>

            <label for="emailadres">E-mailadres:</label>
            <input type="email" id="emailadres" name="email" placeholder="Geef je e-mailadres in"><br>

            <label for="site">Favoriete site:</label>
            <input type="url" id="site" name="site" placeholder="Geef de URL van je favoriete site"><br>
        </fieldset>

        <fieldset>
            <legend>Extra informatie</legend>
            <label for="getal1">Favoriete getal tussen 1-10:</label>
            <input type="number" id="getal1" name="getal1" min="1" max="10"><br>

            <label for="getal2">Favoriete getal tussen 11-1000:</label>
            <input type="range" id="getal2" name="getal2" min="11" max="1000"><br>

            <label for="geboortedatum">Wanneer ben je geboren?</label>
            <input type="date" id="geboortedatum" name="geboortedatum"><br>

            <label for="postcode">Belgische postcode*:</label>
            <input type="text" id="postcode" name="postcode" placeholder="1000" pattern="[1-9][0-9]{3}" title="Geef een Belgische postcode van 1000-9999" required><br>
        </fieldset>

        <fieldset>
            <legend>Varia</legend>
            <label for="zoeken">Zoeken naar iets:</label>
            <input type="search" id="zoeken" name="zoeken"><br>

            <label for="kleur">Wat is je lievelingskleur?</label>
            <input type="color" id="kleur" name="kleur"><br>

            <label for="bestand">Upload een bestand:</label>
            <input type="file" id="bestand" name="bestand"><br>
        </fieldset>

        <input type="submit" value="Submit">
    </form>
</body>
</html>
